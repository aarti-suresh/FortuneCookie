$kind: http-request
url: "{{baseUrl}}:/fortune?theme=work&length=long&language=en&mood=inspirational"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: theme
    value: work
    description: Filter fortunes by theme
  - key: length
    value: long
    description: Length of the fortune
  - key: language
    value: en
    description: Language code for the fortune
  - key: mood
    value: inspirational
    description: Mood filter
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      // Contract Tests for Fortune Cookie API


      // 1. Validate response status code is 200 OK

      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });


      // 2. Validate response time is acceptable

      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });


      // 3. Validate Content-Type header

      pm.test("Content-Type header is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      // Parse response body

      let jsonData;

      try {
          jsonData = pm.response.json();
      } catch (e) {
          pm.test("Response body is valid JSON", function () {
              throw new Error("Response is not valid JSON");
          });
      }


      // 4. Validate all expected fields are present

      pm.test("Response contains all required fields", function () {
          pm.expect(jsonData).to.have.property("fortune");
          pm.expect(jsonData).to.have.property("theme");
          pm.expect(jsonData).to.have.property("length");
          pm.expect(jsonData).to.have.property("language");
          pm.expect(jsonData).to.have.property("mood");
      });


      // 5. Validate field types are correct

      pm.test("Field 'fortune' is a string", function () {
          pm.expect(jsonData.fortune).to.be.a("string");
      });


      pm.test("Field 'theme' is a string", function () {
          pm.expect(jsonData.theme).to.be.a("string");
      });


      pm.test("Field 'length' is a string", function () {
          pm.expect(jsonData.length).to.be.a("string");
      });


      pm.test("Field 'language' is a string", function () {
          pm.expect(jsonData.language).to.be.a("string");
      });


      pm.test("Field 'mood' is a string", function () {
          pm.expect(jsonData.mood).to.be.a("string");
      });


      // 6. Validate returned values match input parameters

      pm.test("Response 'theme' matches request parameter", function () {
          const requestTheme = pm.request.url.query.get("theme");
          pm.expect(jsonData.theme).to.eql(requestTheme);
      });


      pm.test("Response 'length' matches request parameter", function () {
          const requestLength = pm.request.url.query.get("length");
          pm.expect(jsonData.length).to.eql(requestLength);
      });


      pm.test("Response 'language' matches request parameter", function () {
          const requestLanguage = pm.request.url.query.get("language");
          pm.expect(jsonData.language).to.eql(requestLanguage);
      });


      pm.test("Response 'mood' matches request parameter", function () {
          const requestMood = pm.request.url.query.get("mood");
          pm.expect(jsonData.mood).to.eql(requestMood);
      });


      // 7. Basic content validation

      pm.test("Fortune text is not empty", function () {
          pm.expect(jsonData.fortune).to.not.be.empty;
          pm.expect(jsonData.fortune.length).to.be.above(0);
      });


      pm.test("Fortune text length is appropriate for 'long' setting", function
      () {
          // Long fortunes should typically be more than 50 characters
          if (jsonData.length === "long") {
              pm.expect(jsonData.fortune.length).to.be.above(50);
          }
      });


      pm.test("Theme value is valid", function () {
          const validThemes = ["work", "home", "love", "life", "health"];
          pm.expect(validThemes).to.include(jsonData.theme);
      });


      pm.test("Length value is valid", function () {
          const validLengths = ["short", "medium", "long"];
          pm.expect(validLengths).to.include(jsonData.length);
      });


      pm.test("Language value is valid", function () {
          // Validate it's a proper language code format (2 letter code)
          pm.expect(jsonData.language).to.match(/^[a-z]{2}$/);
      });


      pm.test("Mood value is valid", function () {
          const validMoods = ["inspirational", "humorous", "thoughtful", "motivational"];
          pm.expect(validMoods).to.include(jsonData.mood);
      });


      // 8. Validate no unexpected fields (strict schema validation)

      pm.test("Response contains only expected fields", function () {
          const expectedFields = ["fortune", "theme", "length", "language", "mood"];
          const actualFields = Object.keys(jsonData);
          pm.expect(actualFields.sort()).to.eql(expectedFields.sort());
      });


      // 9. Validate response body structure matches JSON schema

      pm.test("Response matches expected JSON schema", function () {
          const schema = {
              type: "object",
              required: ["fortune", "theme", "length", "language", "mood"],
              properties: {
                  fortune: { type: "string" },
                  theme: { type: "string" },
                  length: { type: "string" },
                  language: { type: "string" },
                  mood: { type: "string" }
              }
          };
          
          pm.response.to.have.jsonSchema(schema);
      });


      console.log("✅ Contract tests completed for Fortune Cookie API");

      console.log("Fortune received:", jsonData.fortune);
    language: text/javascript
examples: ./.resources/Get a random fortune.resources/examples
order: 1000
