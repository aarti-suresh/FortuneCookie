$kind: http-example
request:
  url: "{{baseUrl}}/fortune?theme=work&length=long&language=en&mood=inspirational"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: theme
      value: work
      description: Filter fortunes by theme
    - key: length
      value: long
      description: Length of the fortune
    - key: language
      value: en
      description: Language code for the fortune
    - key: mood
      value: inspirational
      description: Mood filter
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 5000
